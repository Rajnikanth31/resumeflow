name: Continuous Integration

on:
  push:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Lint Check
        run: npm run lint

      - name: TypeScript Typecheck
        run: npx tsc --noEmit

      - name: Run Tests
        run: npm run test:ci

      - name: Production Build
        run: npm run build
